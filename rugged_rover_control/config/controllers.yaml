controller_manager:
  ros__parameters:
    update_rate: 30
    hardware_platform:
      type: "rugged_rover_hardware_interfaces/sabertooth/SabertoothSystemInterface"
      joints:
        - front_left_joint
        - rear_left_joint
        - front_right_joint
        - rear_right_joint
      state_interfaces:
        - velocity
      command_interfaces:
        - velocity
    controller_names:
      - joint_state_broadcaster
      - diff_drive_controller

    joint_state_broadcaster.type: joint_state_broadcaster/JointStateBroadcaster
    diff_drive_controller.type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["front_left_joint", "rear_left_joint"]
    right_wheel_names: ["front_right_joint", "rear_right_joint"]
    # Effective skid-steer track width calibrated from 360 degree rotation test.
    # Physical rear wheel center distance is ~0.355 m.
    wheel_separation: 0.475
    wheel_radius: 0.082
    use_stamped_vel: false
    base_frame_id: base_link
    cmd_vel_timeout: 0.25
    publish_rate: 30.0
    enable_odom_tf: false
